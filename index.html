<!DOCTYPE html>
<html lang="en">
<head>

            <br>
            <div class="form-group">
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" required>
            </div>
        <br>
        <a href="web.html" target="_blank">
            
            <div class="d1">
                <h5>login</h5>
            </div>
        </a>
        </form>
        <div class="f1">
        <a href=""> 
            <p>Forget password?</p>
        </a>
        <a href=""> 
            <p>create an account</p>
        </a>
        </div>
    </div>
    

</body>
</html>
